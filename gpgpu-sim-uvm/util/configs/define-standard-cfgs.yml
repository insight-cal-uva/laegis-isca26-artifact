# Basefile Configs

A100:
    base_file: "$GPGPUSIM_ROOT/configs/tested-cfgs/A100/gpgpusim.config"

# sim points
5B_INSN:
    extra_params: "-gpgpu_max_insn 5000000000"

2B_INSN:
    extra_params: "-gpgpu_max_insn 2000000000"

1B_INSN:
    extra_params: "-gpgpu_max_insn 1000000000"

100M_INSN:
    extra_params: "-gpgpu_max_insn 100000000"

1M_INSN:
    extra_params: "-gpgpu_max_insn 1000000"
 
4M_INSN:
    extra_params: "-gpgpu_max_insn 4000000"

6M_CYCLE:
    extra_params: "-gpgpu_max_cycle 6000000"

# clock domains
1455MHZ:
    extra_params: "-gpgpu_clock_domains 1455.0:1455.0:1455.0:850.0"

1132MHZ:
    extra_params: "-gpgpu_clock_domains 1132.0:1132.0:1132.0:850.0"

# memory options
HBM:
    extra_params: "-ramulator_mem_type HBM"

PCM:
    extra_params: "-ramulator_mem_type PCM"

GDDR:
    extra_params: "-ramulator_mem_type GDDR5"

LPDDR:
    extra_params: "-ramulator_mem_type LPDDR4"